# Builds and publishes the Docker action image to GHCR and cuts a GitHub release on a v* tag.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write     # build provenance attestation
  attestations: write # SBOM / provenance attestation

env:
  IMAGE: ghcr.io/alexremn/ephemeractl

jobs:
  release:
    name: build, push image & cut release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Compute image tags
        id: tags
        run: |
          REF="${{ github.ref_name }}"          # e.g. v1.2.0 or v1.2.0-rc1
          MAJOR="${REF%%.*}"                     # v1 — moving major tag, matches action.yml's :v1 pin
          TAGS="${{ env.IMAGE }}:${REF},${{ env.IMAGE }}:${MAJOR}"
          # :latest only on non-prerelease tags (no hyphen), per the pinning guidance in SECURITY.md
          if [[ "$REF" != *-* ]]; then TAGS="${TAGS},${{ env.IMAGE }}:latest"; fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: ${{ steps.tags.outputs.tags }}

      # Pull the matching version's section out of CHANGELOG.md so the release
      # body is the curated changelog, with the auto commit list appended below.
      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # v1.2.3 -> 1.2.3
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]"        { flag=1; next }
            flag && (/^## \[/ || /^\[.*\]: /) { exit }
            flag                         { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'Release %s\n' "$GITHUB_REF_NAME" > release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: release-notes.md
          generate_release_notes: true

      # Make `uses: alexremn/ephemeractl@v1` resolve by moving the major git tag
      # to this release commit. Skipped for pre-releases (e.g. v1.2.0-rc1).
      - name: Update moving major git tag
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          MAJOR="${GITHUB_REF_NAME%%.*}"   # v1.2.3 -> v1
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push origin "$MAJOR" --force
