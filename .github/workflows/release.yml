# Activates once the Go implementation lands (cmd/, internal/, go.mod).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/your-org/ephemeractl

jobs:
  release:
    name: build, push image & cut release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          REF="${{ github.ref_name }}"          # e.g. v1.2.0 or v1.2.0-rc1
          MAJOR="${REF%%.*}"                     # v1 — moving major tag, matches action.yml's :v1 pin
          TAGS="${{ env.IMAGE }}:${REF},${{ env.IMAGE }}:${MAJOR}"
          # :latest only on non-prerelease tags (no hyphen), per the pinning guidance in SECURITY.md
          if [[ "$REF" != *-* ]]; then TAGS="${TAGS},${{ env.IMAGE }}:latest"; fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
