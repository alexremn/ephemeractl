# Builds and publishes the Docker action image to GHCR and cuts a GitHub release on a v* tag.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write     # build provenance attestation
  attestations: write # SBOM / provenance attestation

env:
  IMAGE: ghcr.io/alexremn/ephemeractl

jobs:
  release:
    name: build, push image & cut release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Compute image tags
        id: tags
        run: |
          REF="${{ github.ref_name }}"          # e.g. v1.2.0 or v1.2.0-rc1
          MAJOR="${REF%%.*}"                     # v1 — moving major tag, matches action.yml's :v1 pin
          TAGS="${{ env.IMAGE }}:${REF},${{ env.IMAGE }}:${MAJOR}"
          # :latest only on non-prerelease tags (no hyphen), per the pinning guidance in SECURITY.md
          if [[ "$REF" != *-* ]]; then TAGS="${TAGS},${{ env.IMAGE }}:latest"; fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true

      # Make `uses: alexremn/ephemeractl@v1` resolve by moving the major git tag
      # to this release commit. Skipped for pre-releases (e.g. v1.2.0-rc1).
      - name: Update moving major git tag
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          MAJOR="${GITHUB_REF_NAME%%.*}"   # v1.2.3 -> v1
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push origin "$MAJOR" --force
