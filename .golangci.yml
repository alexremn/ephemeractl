# golangci-lint v2 configuration. Keep the version in .github/workflows/ci.yml
# and in CONTRIBUTING.md in sync so local and CI runs use the same gate.
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive
    - gosec
  exclusions:
    # Respect inline // #nosec suppressions and the standard false-positive sets.
    presets:
      - common-false-positives
      - legacy
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports
